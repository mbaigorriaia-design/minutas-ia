version: "3.9"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - ./n8n_data:/home/node/.n8n
    restart: unless-stopped

  frontend_ui:
    build: ./frontend_ui
    container_name: frontend_ui
    ports:
      - "8501:8501"
    depends_on:
      - n8n
    restart: unless-stopped